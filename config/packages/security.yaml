security:
    # Password hashing
    password_hashers:
        App\Entity\Users:
            algorithm: plaintext  # ⚠️ À changer en production pour 'auto'

    # User provider (base de données)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email

    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker  # ← ✅ Ajouter cette ligne
            custom_authenticator: App\Security\AppCustomAuthenticator
            
            logout:
                path: app_logout
                target: /welcome

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                # always_remember_me: true

    # Access control
    access_control:
        - { path: ^/welcome, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        # Protéger toutes les autres pages
        # - { path: ^/, roles: ROLE_USER }

# Configuration spécifique pour l'environnement test
when@test:
    security:
        password_hashers:
            App\Entity\Users:
                algorithm: plaintext