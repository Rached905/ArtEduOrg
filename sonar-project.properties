# SonarQube / SonarScanner - ArtEduOrg
# See https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/

sonar.projectKey=arteduorg
sonar.projectName=ArtEduOrg

# Sources to analyse
sonar.sources=src
sonar.exclusions=**/vendor/**,**/var/**,**/tests/**,**/migrations/**

# Tests and coverage (optional; generated by PHPUnit in CI)
sonar.tests=tests
sonar.test.inclusions=tests/**/*.php
sonar.php.coverage.reportPaths=var/clover.xml

# PHP
sonar.language=php
